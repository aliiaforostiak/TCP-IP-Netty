spring.application.name=apache-camel-orders-demo
camel.main.run-controller=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.datasource.url=jdbc:postgresql://localhost:5432/spring
spring.datasource.username=postgres
spring.datasource.password=123
spring.jpa.show-sql=false

camel.component.kafka.brokers=localhost:9092
camel.component.kafka.auto-offset-reset=earliest
camel.component.kafka.auto-create-topics=false

app.kafka.orders-in-topic=orders-in
app.kafka.orders-processed-topic=orders-processed
app.kafka.orders-dlq-topic=orders-dlq

app.integration.billing-url=http://localhost:8081/billing/orders
app.integration.billing-timeout-ms=2000
app.integration.notification-email=ops@example.com

app.mail.host=localhost
app.mail.port=1025
app.mail.from=orders-demo@example.com
app.mail.username=
app.mail.password=
app.mail.protocol=smtp

app.processing.first-order-discount-percent=10
app.processing.loyalty-discount-percent=5
app.processing.promo-code-discount-percent=7
app.processing.bulk-discount-percent=3
app.processing.bulk-quantity-threshold=10

app.demo.enabled=true

logging.level.org.apache.camel=INFO
logging.level.org.apache.kafka=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.com.zaxxer.hikari=INFO
